<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management UI</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[#0e0e0e] text-white font-sans flex flex-col items-center py-12 px-4 select-none">

    <!-- ADD USER FORM -->
<form
    class="w-full max-w-[500px] bg-[#1a1a1a] border border-[#262626] rounded-2xl p-8 mb-12 shadow-xl" id="form">

    <h2
        style="text-align: center; margin-top: 0; margin-bottom: 32px; font-size: 26px; font-weight: 700; letter-spacing: -0.5px;">
        Add User</h2>

    <!-- Name Field -->
    <div style="margin-bottom: 22px;">
        <label for="name"
            style="display: block; margin-bottom: 10px; font-size: 14px; font-weight: 600; color: #e5e7eb;">Name</label>
        <input type="text" id="name"
            style="width: 100%; height: 44px; padding: 0 14px; box-sizing: border-box; background-color: #313131; border: 1px solid #3c3c3c; border-top: 1px solid #444444; color: #ffffff; border-radius: 8px; font-size: 15px; outline: none;">
    </div>

    <!-- Role Field -->
    <div style="margin-bottom: 22px;">
        <label for="role"
            style="display: block; margin-bottom: 10px; font-size: 14px; font-weight: 600; color: #e5e7eb;">Role</label>
        <input type="text" id="role"
            style="width: 100%; height: 44px; padding: 0 14px; box-sizing: border-box; background-color: #313131; border: 1px solid #3c3c3c; border-top: 1px solid #444444; color: #ffffff; border-radius: 8px; font-size: 15px; outline: none;">
    </div>

    <!-- Bio Field -->
    <div style="margin-bottom: 22px;">
        <label for="bio"
            style="display: block; margin-bottom: 10px; font-size: 14px; font-weight: 600; color: #e5e7eb;">Bio</label>
        <textarea id="bio" rows="4"
            style="width: 100%; padding: 12px 14px; box-sizing: border-box; background-color: #313131; border: 1px solid #3c3c3c; border-top: 1px solid #444444; color: #ffffff; border-radius: 8px; font-size: 15px; outline: none; resize: none; font-family: inherit;"></textarea>
    </div>

    <!-- Photo URL Field -->
    <div style="margin-bottom: 32px;">
        <label for="photo"
            style="display: block; margin-bottom: 10px; font-size: 14px; font-weight: 600; color: #e5e7eb;">Photo
            URL</label>
        <input type="text" id="photo"
            style="width: 100%; height: 44px; padding: 0 14px; box-sizing: border-box; background-color: #313131; border: 1px solid #3c3c3c; border-top: 1px solid #444444; color: #ffffff; border-radius: 8px; font-size: 14px; outline: none;">
    </div>

    <!-- Submit Button -->
    <button type="submit"
        style="width: 100%; height: 46px; background-color: transparent; border: 1px solid #2e2e2e; color: #ffffff; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background-color 0.15s ease;">
        Submit
    </button>

</form>

    <!-- USER CARDS GRID (Dummy Users Included) -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-[1100px]" id="cards-container">

        <h1>No Data!!</h1>

    </div>

    <script src="main.js"></script>
</body>

</html>
