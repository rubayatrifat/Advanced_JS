<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API + HTTP Basics</title>
</head>
<body>
    

    <div class="min-h-screen bg-slate-950 p-8 flex flex-col items-center justify-center font-sans">

        <!-- Section Title / Header -->
        <div class="mb-8 text-center">
            <h2 class="text-2xl font-bold text-slate-100 tracking-wide">API Dashboard: Random Users</h2>
            <p class="text-sm text-slate-400 mt-1">Fetched dynamically using Random User API</p>
        </div>

        <div class="cards-container grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 w-full max-w-7xl"></div>

        <!-- Refresh Button -->
        <div class="mt-8">
            <button id="refresh-button" class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75 transition duration-150 ease-in-out">
                Refresh Users
            </button>
        </div>
    </div>


    <script src="https://cdn.tailwindcss.com"></script>
    <script src="main.js"></script>
</body>
</html>
